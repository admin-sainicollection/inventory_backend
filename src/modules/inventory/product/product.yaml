tags:
  - name: Product
    description: API endpoints for managing products

paths:
  /product/add-product:
    post:
      summary: Create a new product
      description: Only admins or managers can create products. Checks for duplicate SKU or Name before creating.
      tags: [Product]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateInput'
            example:
              name: "Engine Oil"
              sku: "EO-001"
              image: "https://example.com/image.jpg"
              quantity: 100
              category: "Engine"
              brand: "Mobil"
              vender: "AutoVendor"
              purchasePrice: 50
              sellingPrice: 80
              vendorPrice: 55
              description: "High performance engine oil"
              compatibility:
                - name: "Civic"
                  brand: "Honda"
                  variants: ["LX", "EX"]
                  fuelType: ["Petrol"]
                  year: [{from: 2015, to: 2020}]
                  transmission: ["Manual", "Automatic"]
              attributes:
                engineModel: "300V"
                engineCapacity: "20l"
              status: "active"
      responses:
        201:
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        400:
          description: Validation or category error (or duplicate product)
        401:
          description: Unauthorized
        500:
          description: Server error

  /product/update-product/{id}:
    put:
      summary: Update a product
      description: Only admins or managers can update products. Supports updating attributes and compatibility details.
      tags: [Product]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the product to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateInput'
            example:
              name: "Updated Engine Oil"
              quantity: 150
              brand: "Shell"
              compatibility:
                - name: "City"
                  brand: "Honda"
                  variants: ["EX"]
                  fuelType: ["Petrol"]
                  year: [{from: 2017, to: 2021}]
                  transmission: ["Automatic"]
              attributes:
                engineModel: "400X"
      responses:
        200:
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        400:
          description: Validation or category error
        404:
          description: Product not found
        401:
          description: Unauthorized
        500:
          description: Server error

  /product/delete-product/{id}:
    delete:
      summary: Delete a product
      description: Only admins or managers can delete products.
      tags: [Product]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the product to delete
      responses:
        200:
          description: Product deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Product deleted
        404:
          description: Product not found
        401:
          description: Unauthorized
        500:
          description: Server error

  /product/get-all-products:
    get:
      summary: Get all products
      description: Returns a list of all products.
      tags: [Product]
      responses:
        200:
          description: Successfully fetched products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        404:
          description: No products found
        500:
          description: Server error

  /product/get-one-product/{id}:
    get:
      summary: Get a single product
      description: Returns product by ID.
      tags: [Product]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the product
      responses:
        200:
          description: Successfully fetched product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        404:
          description: Product not found
        500:
          description: Server error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    YearRange:
      type: object
      properties:
        from:
          type: number
          example: 2015
        to:
          type: number
          example: 2020

    CarModel:
      type: object
      properties:
        name:
          type: string
          example: "Civic"
        brand:
          type: string
          example: "Honda"
        variants:
          type: array
          items:
            type: string
          example: ["LX", "EX"]
        fuelType:
          type: array
          items:
            type: string
          example: ["Petrol"]
        year:
          type: array
          items:
            $ref: '#/components/schemas/YearRange'
        transmission:
          type: array
          items:
            type: string
          example: ["Manual", "Automatic"]

    Product:
      type: object
      properties:
        _id:
          type: string
          example: "6524f1ef930b5a3d64fd9f22"
        name:
          type: string
          example: "Engine Oil"
        sku:
          type: string
          example: "EO-001"
        image:
          type: string
          example: "https://example.com/image.jpg"
        quantity:
          type: number
          example: 100
        category:
          type: string
          example: "Engine"
        brand:
          type: string
          example: "Mobil"
        vender:
          type: string
          example: "AutoVendor"
        purchasePrice:
          type: number
          example: 50
        sellingPrice:
          type: number
          example: 80
        vendorPrice:
          type: number
          example: 55
        description:
          type: string
          example: "High performance engine oil"
        compatibility:
          type: array
          items:
            $ref: '#/components/schemas/CarModel'
        attributes:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: ["active", "inactive"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductCreateInput:
      type: object
      required:
        - name
        - sku
        - quantity
        - category
        - brand
        - vender
        - purchasePrice
        - sellingPrice
      properties:
        name:
          type: string
        sku:
          type: string
        image:
          type: string
        quantity:
          type: number
        category:
          type: string
        brand:
          type: string
        vender:
          type: string
        purchasePrice:
          type: number
        sellingPrice:
          type: number
        vendorPrice:
          type: number
        description:
          type: string
        compatibility:
          type: array
          items:
            $ref: '#/components/schemas/CarModel'
        attributes:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: ["active", "inactive"]

    ProductUpdateInput:
      allOf:
        - $ref: '#/components/schemas/ProductCreateInput'