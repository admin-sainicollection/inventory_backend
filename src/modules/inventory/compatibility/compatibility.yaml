openapi: 3.0.3
info:
  title: Car Model Compatibility API
  version: 1.1.0
  description: >
    API endpoints for managing car models, including search, pagination, and brand compatibility.

tags:
  - name: Compatibility
    description: API endpoints for managing and searching car models

paths:
  /compatibility/add-car-model:
    post:
      summary: Add a new car model
      description: Only admins can add car models with images and brand info.
      tags: [Compatibility]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - brandName
                - variants
                - fuelTypes
                - transmissions
                - baseImage
              properties:
                name:
                  type: string
                  example: "Civic"
                brandName:
                  type: string
                  example: "Honda"
                brandLogo:
                  type: string
                  format: binary
                  description: Brand logo image
                parentCompany:
                  type: string
                  example: "Honda Motor Co., Ltd."
                variants:
                  type: array
                  items:
                    type: string
                  example: ["V", "VX", "ZX"]
                fuelTypes:
                  type: array
                  items:
                    type: string
                  example: ["Petrol", "Diesel"]
                transmissions:
                  type: array
                  items:
                    type: string
                  example: ["Manual", "Automatic"]
                baseImage:
                  type: string
                  format: binary
                  description: Main image of the car
                generations:
                  type: string
                  description: JSON string of generations array [{from,to,images:[filename1,filename2]}]
                generationImages:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Multiple images for each generation
      responses:
        201:
          description: Car model added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarModelResponse'
        400:
          description: Car model already exists
        401:
          description: Unauthorized
        500:
          description: Server error

  /compatibility/update-car-model/{id}:
    put:
      summary: Update a car model
      description: Update car model details. Only admins can update.
      tags: [Compatibility]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the car model to update
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Civic Updated"
                brandName:
                  type: string
                  example: "Honda Updated"
                brandLogo:
                  type: string
                  format: binary
                parentCompany:
                  type: string
                  example: "Honda Motor Co., Ltd."
                variants:
                  type: array
                  items:
                    type: string
                  example: ["V", "VX", "ZX"]
                fuelTypes:
                  type: array
                  items:
                    type: string
                  example: ["Petrol", "Diesel"]
                transmissions:
                  type: array
                  items:
                    type: string
                  example: ["Manual", "Automatic"]
                baseImage:
                  type: string
                  format: binary
                  description: Main image of the car
                generations:
                  type: string
                  description: JSON string of generations array [{from,to,images:[filename1,filename2]}]
                generationImages:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Multiple images for each generation
      responses:
        200:
          description: Car model updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarModelResponse'
        404:
          description: Car model not found
        401:
          description: Unauthorized
        500:
          description: Server error

  /compatibility/delete-car-model:
    delete:
      summary: Delete a car model
      description: Delete a car model by its ID. Only admins can delete.
      tags: [Compatibility]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarModelDeleteInput'
      responses:
        200:
          description: Car model deleted successfully
        404:
          description: Car model not found
        401:
          description: Unauthorized
        500:
          description: Server error

  /compatibility/get-all-car-models:
    get:
      summary: Get or search car models
      description: >
        Returns a paginated list of car models sorted by name.  
        - If `q` is provided, performs a case-insensitive search across brand name, car name, fuel types, transmissions, variants, and generation years.  
        - If no `q` is provided, returns all models.  
        - Supports `limit` and `page` for pagination.
      tags: [Compatibility]
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search keyword (brand name, car name, transmission, fuel type, etc.)
          example: "automatic"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Number of records per page
          example: 10
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Page number for pagination
          example: 1
      responses:
        200:
          description: Successfully fetched car models (with or without search)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: Showing results for "automatic"
                  total:
                    type: integer
                    example: 23
                  page:
                    type: integer
                    example: 1
                  limit:
                    oneOf:
                      - type: integer
                      - type: string
                    example: 10
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/CarModel'
        500:
          description: Server error

  /compatibility/get-car-model/{id}:
    get:
      summary: Get car model by ID
      description: Fetch a single car model's compatibility details using its ID.
      tags: [Compatibility]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the car model to fetch
      responses:
        200:
          description: Successfully fetched car model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarModel'
        400:
          description: Invalid car model ID format
        404:
          description: Car model not found
        401:
          description: Unauthorized
        500:
          description: Server error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CarModel:
      type: object
      properties:
        _id:
          type: string
          example: "6524f0ef930b5a3d64fd8f12"
        name:
          type: string
          example: "Civic"
        brand:
          type: object
          properties:
            name:
              type: string
              example: "Honda"
            logo:
              type: string
              example: "https://res.cloudinary.com/demo/image/upload/v1723456789/brands/honda.png"
            parentCompany:
              type: string
              example: "Honda Motor Co., Ltd."
        variants:
          type: array
          items:
            type: string
          example: ["V", "VX", "ZX"]
        fuelTypes:
          type: array
          items:
            type: string
          example: ["Petrol", "Diesel"]
        transmissions:
          type: array
          items:
            type: string
          example: ["Manual", "Automatic"]
        baseImage:
          type: string
          example: "https://res.cloudinary.com/demo/image/upload/v1723456789/cars/civic-base.png"
        generations:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
                example: "2018"
              to:
                type: string
                example: "2022"
              images:
                type: array
                items:
                  type: string
                example: ["https://res.cloudinary.com/demo/image/upload/v1723456789/cars/civic-2018.png"]
        createdAt:
          type: string
          format: date-time
          example: "2025-10-10T12:34:56.789Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-10-10T12:34:56.789Z"

    CarModelDeleteInput:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          example: "6524f0ef930b5a3d64fd8f12"

    CarModelResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Car model added successfully"
        model:
          $ref: '#/components/schemas/CarModel'
